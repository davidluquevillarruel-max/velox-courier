<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velox Courier - Admin</title>

  <!-- ══════════════════════════════════════════
       FUENTES EXTERNAS (Google Fonts)
  ══════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

  <!-- ══════════════════════════════════════════
       ICONOS EXTERNOS (CDN)
       · Tabler Icons  → iconos de interfaz usados en el sistema
       · Font Awesome  → iconos adicionales opcionales
  ══════════════════════════════════════════ -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- ══════════════════════════════════════════
       ESTILOS PROPIOS (css/)
  ══════════════════════════════════════════ -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tables.css" />
  <link rel="stylesheet" href="css/charts.css" />
  <link rel="stylesheet" href="css/detalle.css" />
</head>
<body>

<!-- ══════════════════════════════════════════
     GUARD DE AUTENTICACIÓN
     Si no hay sesión guardada, redirige a login.html
════════════════════════════════════════════ -->
<script>
  (function() {
    var sesion = localStorage.getItem('velox_usuario');
    if (!sesion) {
      window.location.href = 'login.html';
    }
  })();
</script>

<div class="layout">

  <!-- ══════════════════════════════════════════
       SIDEBAR — navegación principal
  ══════════════════════════════════════════ -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-inner">
        <i class="ti ti-truck-delivery logo-icon" aria-hidden="true"></i>
        <div>
          <div class="logo-name">VeloxCourierAdmin</div>
          <div class="logo-sub">Panel de gestión</div>
        </div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-item active" onclick="showPage('pedidos')">
        <i class="ti ti-package" aria-hidden="true"></i> Todos los pedidos
      </div>
      <div class="nav-item" onclick="showPage('motorizados')">
        <i class="ti ti-motorbike" aria-hidden="true"></i> Motorizados
      </div>
      <div class="nav-item" onclick="showPage('clientes')">
        <i class="ti ti-building-store" aria-hidden="true"></i> Clientes / Tiendas
      </div>
      <div class="nav-item" onclick="showPage('evidencias')">
        <i class="ti ti-chart-bar" aria-hidden="true"></i> Evidencias
      </div>
      <div class="nav-item" onclick="showPage('tarifas')">
        <i class="ti ti-map-pin" aria-hidden="true"></i> Tarifas
      </div>
      <div class="nav-item" onclick="showPage('caja')">
        <i class="ti ti-cash" aria-hidden="true"></i> Caja
      </div>
      <div class="nav-item" onclick="showPage('asignacion')">
        <i class="ti ti-arrows-exchange" aria-hidden="true"></i> Asignación
      </div>
    </nav>

    <div class="sidebar-footer">
      <div id="usuario-sesion" style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;overflow:hidden">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--color-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0" id="usuario-avatar">—</div>
          <div style="overflow:hidden">
            <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="usuario-nombre">—</div>
            <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:capitalize" id="usuario-rol">—</div>
          </div>
        </div>
        <button onclick="cerrarSesion()" title="Cerrar sesión" style="background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:16px;flex-shrink:0">
          <i class="ti ti-logout" aria-hidden="true"></i>
        </button>
      </div>
      Hoy: <span id="fecha-hoy"></span>
    </div>
  </div><!-- /sidebar -->

  <!-- ══════════════════════════════════════════
       ÁREA PRINCIPAL — contenedor de páginas
       Cada página vive en pages/*.html
       y se inyecta aquí por navigation.js
  ══════════════════════════════════════════ -->
  <div class="main" id="main-content">
    <!-- El contenido se carga dinámicamente desde pages/ -->
  </div>

</div><!-- /layout -->

<!-- Notificación flotante global -->
<div class="notification" id="notif"></div>

<!-- ══════════════════════════════════════════
     SCRIPTS (orden importa)
     utils     → debe ir primero (showNotif, fecha)
     navigation → carga las páginas desde pages/
     filters   → filterTable, filterByStatus
     asignacion → asignar, desasignar
     charts    → gráfico de barras
══════════════════════════════════════════ -->
<script src="js/utils.js"></script>
<script src="js/tarifas.js"></script>
<script src="js/caja.js"></script>
<script src="js/motorizados.js"></script>
<script src="js/pedidos.js"></script>
<script src="js/clientes.js"></script>
<script src="js/navigation.js"></script>
<script src="js/filters.js"></script>
<script src="js/asignacion.js"></script>
<script src="js/charts.js"></script>

</body>
</html>
